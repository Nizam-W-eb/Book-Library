<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Library</title>
</head>
<body>
    <div class="book-form disabled">
        <form class="book-form" >
            <div>
              <label for="book-name">Name:</label>
              <input type="text" class="book-value book-text" id="book-name" placeholder="Atomic Habits" required>
            </div>
            <div>
              <label for="book-author">Author:</label>
              <input type="text" class="book-value book-text" id="book-author" placeholder="James Clear" required>
            </div>
            <div>
              <label for="book-pages">Pages:</label>
              <input type="number" class="book-value book-text" id="book-pages" placeholder="399" value="0" required >
            </div>
            <div>
              <label for="book-read">Have you read the book?</label>
              <input type="checkbox" id="book-read" class="book value" required >
            </div>
            <div>
              <button class="book-submit" type="submit">Submit</button>
              <button type="reset">Cancel</button>
            </div>
        </form>
    </div>
    <div class="header">
        <h1 class="title">Library</h1>
        <button class="button-add">Add Book</button>
    </div>
    <div class="main">
       
    </div>
    <script src="script.js"></script>
</body>
</html>
